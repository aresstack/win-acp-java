# win-acp-java – Default Agent Configuration
#
# This file is shipped with the repo and works out of the box.
# To customize: copy to 'application.yml' (gitignored) and edit.
# Or pass any YAML file via --config <path> or WIN_ACP_CONFIG env var.

profile:
  id: default
  name: Default Agent
  description: ACP agent host with MNIST DirectML inference (V1 vertical slice)
  systemRole: >
    You are a helpful assistant. Use available tools when needed.
    Always ask for approval before performing destructive actions.

behavior:
  startNode: analyze
  maxIterations: 20
  abortMessage: Maximum iterations reached – aborting.
  nodes:
    - id: analyze
      type: ANALYZE_INPUT
    - id: goal
      type: DETERMINE_GOAL
    - id: select_tool
      type: SELECT_TOOL
    - id: exec_tool
      type: EXECUTE_TOOL
    - id: eval_result
      type: EVALUATE_TOOL_RESULT
    - id: respond
      type: FORMULATE_RESPONSE
    - id: finalize
      type: FINALIZE
    - id: error
      type: HANDLE_ERROR
    - id: approval
      type: REQUEST_APPROVAL
    - id: clarify
      type: GENERATE_CLARIFICATION
  edges:
    - { from: analyze,     to: goal,        condition: ALWAYS }
    - { from: goal,        to: select_tool, condition: TOOL_REQUIRED }
    - { from: goal,        to: respond,     condition: TOOL_NOT_REQUIRED }
    - { from: select_tool, to: approval,    condition: APPROVAL_REQUIRED }
    - { from: select_tool, to: exec_tool,   condition: TOOL_ALLOWED }
    - { from: select_tool, to: error,       condition: TOOL_NOT_ALLOWED }
    - { from: approval,    to: exec_tool,   condition: ALWAYS }
    - { from: exec_tool,   to: eval_result, condition: ALWAYS }
    - { from: eval_result, to: respond,     condition: RESULT_SUFFICIENT }
    - { from: eval_result, to: clarify,     condition: RESULT_INSUFFICIENT }
    - { from: clarify,     to: finalize,    condition: ALWAYS }
    - { from: respond,     to: finalize,    condition: ALWAYS }
    - { from: error,       to: finalize,    condition: ALWAYS }

mcpServers:
  - id: filesystem
    name: Filesystem MCP
    transport: stdio
    command: npx -y @modelcontextprotocol/server-filesystem .
    timeoutSeconds: 30

toolPolicy:
  allowedTools: []
  blockedTools: []
  approvalRequiredTools: []
  maxToolCallsPerTurn: 10

approvalPolicy:
  enabled: true
  approvalRequiredByDefault: false

# V1 inference: MNIST digit classification via DirectML.
# Currently validated with mnist-12.onnx. No text generation / chat models yet.
inference:
  modelPath: model/mnist-12.onnx
  backend: directml

logLevel: INFO
debugGraphTracing: false

